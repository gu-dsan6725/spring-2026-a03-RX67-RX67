version: 1

# Path to the target repository being analyzed
target_repo: "../mcp-gateway-registry"

# Execution controls
execution:
  default_timeout_seconds: 8
  max_commands_per_query: 20
  max_output_chars_per_command: 8000
  max_total_output_chars: 20000

# Directories/files to exclude from searches
exclude:
  directories:
    - node_modules
    - .venv
    - dist
    - build
    - .git
    - __pycache__
  file_patterns:
    - "*.min.*"
    - "*.lock"

# Retrieval behavior
retrieval:
  stop_if_min_files_found: 2
  stop_if_min_total_chars: 1500
  max_stages: 4

# Logging behavior
logging:
  level: "INFO"
  log_commands: true
  log_truncated_outputs: true

# LLM behavior
llm:
  model: "groq/llama-3.3-70b-versatile"   
  temperature: 0
  max_tokens: 1200
  require_citations: true
  forbid_hallucination: true