# =========================
# 📂 Data Paths
# =========================
data:
  csv_path: data/structured/daily_sales.csv
  text_dir: data/unstructured/


# =========================
# 🔎 Retrieval Settings
# =========================
retrieval:

  # Structured (CSV)
  csv:
    date_column: date
    category_column: category
    region_column: region
    units_column: units_sold
    revenue_column: total_revenue

  # Unstructured (Text)
  text:
    top_k: 3                # how many documents to return
    max_chunk_chars: 2000   # truncate long text files
    keyword_window: 3       # number of surrounding lines to include

  # Multi-source
  multi_source:
    text_top_k: 3
    max_combined_chars: 6000


# =========================
# 🤖 LLM Settings
# =========================
llm:
  model: groq/llama-3.3-70b-versatile
  temperature: 0
  max_tokens: 1000
  require_citations: true
  forbid_hallucination: true


# =========================
# 🧾 Output / Formatting
# =========================
formatting:
  include_sources: true
  include_numeric_evidence: true
  max_context_blocks: 10


# =========================
# ⚙️ Execution Control
# =========================
execution:
  debug: false
  verbose: false